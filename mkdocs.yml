site_name: tomlrt
site_description: A format-preserving TOML parser and writer for Python.
site_url: https://dimbleby.github.io/tomlrt/
repo_url: https://github.com/dimbleby/tomlrt
repo_name: dimbleby/tomlrt
edit_uri: edit/main/docs/

watch:
  - src

theme:
  name: material
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_bases: false
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: false
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Building documents: building.md
  - Editing documents: editing.md
  - Typed access: access.md
  - Comments: comments.md
  - Errors: errors.md
  - API reference: api.md
