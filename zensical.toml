[project]
site_name = "tomlrt"
site_description = "A format-preserving TOML reader and writer for Python."
site_url = "https://dimbleby.github.io/tomlrt/"
repo_url = "https://github.com/dimbleby/tomlrt"
nav = [
  { Home = "index.md" },
  { Quickstart = "quickstart.md" },
  { "Building documents" = "building.md" },
  { "Reading documents" = "reading.md" },
  { "Editing documents" = "editing.md" },
  { Comments = "comments.md" },
  { Errors = "errors.md" },
  { "API reference" = "api.md" },
]

[project.theme]
features = [
  "content.code.copy",
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
  "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.toc]
permalink = true

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_root_heading = true
show_root_full_path = false
show_bases = false
show_source = false
show_signature_annotations = true
separate_signature = true
members_order = "source"
group_by_category = false
# Suppress overrides of stdlib dict/list methods so the rendered API
# is the tomlrt-specific surface, not an inconsistent mix of which
# overrides happened to acquire a docstring.
filters = [
  "!^_[^_]",
  "!^__(?!init__$)",
  "!^(clear|copy|fromkeys|get|items|keys|pop|popitem|setdefault|update|values)$",
  "!^(append|count|extend|index|insert|remove|reverse|sort)$",
]
